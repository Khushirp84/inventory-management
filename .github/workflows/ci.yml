name: Inventory Management CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    # Step 1 - Get the code
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2 - Setup Python
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # Step 3 - Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn sqlalchemy pytest httpx pytest-cov

    # Step 4 - Run tests with coverage
    - name: Run tests
      run: |
        cd backend
        python -m pytest tests/ -v --cov=. --cov-report=term-missing

    # Step 5 - Show pass/fail result
    - name: Test Summary
      if: always()
      run: echo "Tests completed!"